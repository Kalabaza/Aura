<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Icon Rendering Test</title>
  <style>
    :root {
      --bg-color: #1a1a1a;
      --text-color: #e0e0e0;
      --cell-bg: #2a2a2a;
      --border-color: #444;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
    }
    #status {
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(6, max-content);
      gap: 10px;
    }
    .icon-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--cell-bg);
      padding: 8px;
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }
    .icon-cell canvas {
      image-rendering: pixelated;
      border: 1px solid #666;
    }
    .icon-name {
      margin-top: 6px;
      font-size: 9px;
      color: #aaa;
      text-align: center;
      max-width: 80px;
      word-break: break-all;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <h1>Aura Icon Rendering Test</h1>
  <div id="status">Loading icons...</div>
  <div id="grid"></div>

  <script type="module">
    import * as Icons from './src/assets/icons.ts';

    // Convert RGB565(A8) icon data to an ImageBitmap (separate planes layout)
    async function bitmapFromRGB565(iconData) {
      const { width, height, stride, data, format } = iconData;

      // LVGL RGB565A8 uses separate planes: RGB block then tightly-packed alpha block
      // Validate data length
      const minColorLength = stride * height;
      if (data.length < minColorLength) {
        throw new Error(`Icon data too short: ${data.length} < ${minColorLength}`);
      }

      const hasAlpha = format === 'RGB565A8';
      if (hasAlpha) {
        const alphaOffset = height * stride;
        if (data.length < alphaOffset + height * width) {
          throw new Error(`Icon data too short for alpha: ${data.length} < ${alphaOffset + height * width}`);
        }
      }

      // Create pixel buffer (RGBA)
      const buf = new Uint8ClampedArray(width * height * 4);

      // Convert each pixel
      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const srcIdx = y * stride + x * 2;
          const lo = data[srcIdx];
          const hi = data[srcIdx + 1];
          const pixel = lo | (hi << 8); // little-endian

          // Extract RGB565 components
          const r5 = (pixel >> 11) & 0x1F;
          const g6 = (pixel >> 5) & 0x3F;
          const b5 = pixel & 0x1F;

          // Expand to 8-bit
          const r8 = (r5 << 3) | (r5 >> 2);
          const g8 = (g6 << 2) | (g6 >> 4);
          const b8 = (b5 << 3) | (b5 >> 2);

          const dstIdx = (y * width + x) * 4;
          buf[dstIdx] = r8;
          buf[dstIdx + 1] = g8;
          buf[dstIdx + 2] = b8;

          let alpha = 255;
          if (hasAlpha) {
            const alphaIdx = height * stride + y * width + x;
            alpha = data[alphaIdx];
          }
          buf[dstIdx + 3] = alpha;
        }
      }

      // Create ImageData and then ImageBitmap
      const imgData = new ImageData(buf, width, height);
      const bitmap = await createImageBitmap(imgData);
      return bitmap;
    }

    async function renderAllIcons() {
      const grid = document.getElementById('grid');
      const statusEl = document.getElementById('status');
      const entries = Object.entries(Icons);
      let successCount = 0;
      let failCount = 0;

      for (const [name, rawData] of entries) {
        const data = rawData;
        try {
          // Determine display scale for visibility (small icons 20x20 → scale up; large icons 100x100 → natural)
          const scale = name.startsWith('image_') ? 1 : 3;
          const displayWidth = data.width * scale;
          const displayHeight = data.height * scale;

          // Create canvas element - set internal resolution to display size to avoid clipping
          const canvas = document.createElement('canvas');
          canvas.width = displayWidth;
          canvas.height = displayHeight;
          canvas.style.width = displayWidth + 'px';
          canvas.style.height = displayHeight + 'px';

          // Create ImageBitmap from icon data
          let bitmap;
          if (data.format === 'RGB565' || data.format === 'RGB565A8') {
            bitmap = await bitmapFromRGB565(data);
          } else {
            // Fallback: treat as PNG data (unlikely)
            const blob = new Blob([data.data], { type: 'image/png' });
            bitmap = await createImageBitmap(blob);
          }

          // Draw bitmap scaled to fill canvas, without smoothing
          const ctx = canvas.getContext('2d');
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(bitmap, 0, 0, displayWidth, displayHeight);

          // Create cell with label
          const cell = document.createElement('div');
          cell.className = 'icon-cell';
          cell.appendChild(canvas);
          const label = document.createElement('div');
          label.className = 'icon-name';
          label.textContent = name;
          cell.appendChild(label);
          grid.appendChild(cell);

          successCount++;
        } catch (err) {
          console.error(`Failed to render ${name}:`, err);
          failCount++;
        }
      }

      // Update status message
      if (failCount === 0) {
        statusEl.textContent = `Successfully rendered ${successCount} icons.`;
        statusEl.style.color = '#4CAF50';
      } else {
        statusEl.textContent = `Rendered ${successCount}, ${failCount} failed. Check console.`;
        statusEl.style.color = '#FF5722';
      }
    }

    renderAllIcons().catch(err => {
      console.error('Fatal error:', err);
      document.getElementById('status').textContent = 'Failed to load icons. See console.';
      document.getElementById('status').style.color = '#FF0000';
    });
  </script>
</body>
</html>
